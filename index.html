<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c6e3e">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DodiApps - Lite Stabil Revisi Akhir (dodiapps-ver8.9)</title>

<style>
body{
font-family:system-ui,Segoe UI,Arial;
background:#f1f3f6;
margin:0;
padding:15px;
color:#333;
}
  #splash-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#2c6e3e;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

#splash-screen img{
width:200px;
}
.app{
max-width:480px;
margin:auto;
}
.card{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
h2{
margin-top:0;
font-size:18px;
}
label{
font-size:13px;
font-weight:600;
display:block;
margin-top:10px;
}
input,select{
width:100%;
padding:10px;
margin-top:4px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2e7dff;
color:white;
font-size:15px;
font-weight:600;
}
button.delete{
background:#e53935;
margin-top:4px;
}
button.edit{
background:#ff9800;
margin-top:4px;
}
.summary{
background:#f7f9fc;
padding:10px;
border-radius:8px;
margin-top:10px;
font-size:14px;
}
table{
width:100%;
border-collapse:collapse;
font-size:13px;
table-layout:fixed;
}

th,td{
padding:6px;
border-bottom:1px solid #eee;
text-align:left;
word-break:break-word;
}

th{
font-weight:600;
}

/* ===== TABEL TRANSFER STABIL ===== */

#tblTransfer td:nth-child(1),
#tblTransfer th:nth-child(1){
width:90px;
white-space:nowrap;
}

#tblTransfer td:nth-child(2),
#tblTransfer th:nth-child(2){
width:110px;
white-space:nowrap;
}

#tblTransfer td:nth-child(3){
word-break:break-word;
max-width:160px;
}

#tblTransfer td:nth-child(4),
#tblTransfer th:nth-child(4){
width:95px;
white-space:nowrap;
}

#tblTransfer td{
overflow:hidden;
text-overflow:ellipsis;
}
#tblPanen td:nth-child(4),
#tblPanen th:nth-child(4){
white-space:nowrap;
}

.action-btn{
display:flex;
flex-direction:column;
gap:4px;
}
.action-btn button{
padding:3px 5px;
font-size:11px;
width:70px;
}
#tblPanen button.delete{
width:20px;
height:20px;
padding:0;
margin:0;
font-size:11px;
line-height:20px;
border-radius:4px;
}
#tblPanen td:last-child{
width:20px;
text-align:right;
}
/* tombol install aplikasi */

#install-app{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:none;
z-index:9999;
}

#btnInstall{
background:#2c6e3e;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
font-size:14px;
box-shadow:0 3px 8px rgba(0,0,0,0.25);
}  
</style>
</head>

<body>

<div class="app">

<div class="card">
<h2>Input Data Panen</h2>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Lokasi</label>
<select id="lokasi" onchange="cekLokasi();hitung()">
<option>Plasma 5</option>
<option>Kapar</option>
<option>Agro</option>
<option>Plasma 4</option>
<option>Kebun Bersama</option>
</select>

<div id="inputPanenBox">

<label>Jumlah Panen (kg)</label>
<input id="panen" inputmode="numeric" oninput="formatInput(this);hitung()">

<label>Harga / kg</label>
<input id="harga" inputmode="numeric" oninput="formatInput(this);hitung()">

<label>Upah Panen & Konsumsi</label>
<input id="upah" inputmode="numeric" oninput="formatInput(this);hitung()">

</div>

<div id="inputBersihBox" style="display:none">

<label>Penghasilan Bersih</label>
<input id="inputBersih" inputmode="numeric" oninput="formatInput(this);hitung()">

</div>

<div class="summary">
<div>Bruto : <b id="bruto">Rp 0</b></div>
<div>Potongan Perawatan : <b id="potongan">Rp 0</b></div>
<div>Kotor : <b id="kotor">Rp 0</b></div>
<div>Fee Pengawas : <b id="fee">Rp 0</b></div>
<div><b>Total Bersih : <span id="bersih">Rp 0</span></b></div>
</div>

<button onclick="simpanDanKirimPanen()">Simpan & Kirim WhatsApp</button>

</div>

<div class="card">
<h2>Input Transfer</h2>

<input type="hidden" id="editTransferIndex">

<label>Tanggal</label>
<input type="date" id="tglTransfer">

<label>Jumlah</label>
<input id="jumlahTransfer" inputmode="numeric" oninput="formatInput(this)">

<label>Catatan</label>
<input id="catatanTransfer">

<button onclick="simpanDanKirimTransfer()">Simpan & Kirim WhatsApp</button>

</div>

<div class="card">
<h2>Riwayat Panen</h2>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Lokasi</th>
<th>Panen</th>
<th>Pendapatan Bersih</th>
<th></th>
</tr>
</thead>
<tbody id="tblPanen"></tbody>
</table>

<div class="summary">
<b>TOTAL PENGHASILAN BULAN <span id="namaBulanPanen"></span> <span id="tahunPanen"></span> :
<span id="totalPanenBulan">Rp 0</span></b>
</div>

</div>

<div class="card">
<h2>Riwayat Transfer</h2>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jumlah</th>
<th>Catatan</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tblTransfer"></tbody>
</table>

<div class="summary">
<b>TOTAL TRANSFER BULAN <span id="namaBulanTransfer"></span> <span id="tahunTransfer"></span> :
<span id="totalTransferBulan">Rp 0</span></b>
</div>

</div>

</div>

<script>

function tanggalIndonesia(tgl){
if(!tgl) return "";
let bulan=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
let p=tgl.split("-");
return Number(p[2])+" "+bulan[Number(p[1])-1]+" "+p[0];
}

function angka(v){
return Number(v.replace(/\./g,""))||0;
}

function rupiah(n){
return "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

function formatInput(el){
let v = el.value.replace(/\D/g,"");
el.value = v.replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

function cekLokasi(){

let lokasi = document.getElementById("lokasi").value;
let simple = (lokasi==="Plasma 4" || lokasi==="Kebun Bersama");

document.getElementById("inputPanenBox").style.display = simple ? "none":"block";
document.getElementById("inputBersihBox").style.display = simple ? "block":"none";
document.querySelector(".summary").style.display = simple ? "none":"block";

resetHitung();

}

function resetHitung(){

document.getElementById("panen").value="";
document.getElementById("harga").value="";
document.getElementById("upah").value="";
document.getElementById("inputBersih").value="";

document.getElementById("potongan").innerText="Rp 0";
document.getElementById("bruto").innerText="Rp 0";
document.getElementById("kotor").innerText="Rp 0";
document.getElementById("fee").innerText="Rp 0";
document.getElementById("bersih").innerText="Rp 0";

}

function potonganLokasi(l){
if(l==="Plasma 5") return 500000;
if(l==="Kapar") return 1000000;
if(l==="Agro") return 1000000;
return 0;
}

function feePersen(l){
if(l==="Plasma 5") return 0.15;
if(l==="Kapar") return 0.15;
if(l==="Agro") return 0.17;
return 0;
}

function hitung(){

let lokasi = document.getElementById("lokasi").value;

if(lokasi==="Plasma 4" || lokasi==="Kebun Bersama"){

let bersih = angka(document.getElementById("inputBersih").value||"0");
document.getElementById("bersih").innerText = rupiah(bersih);

return {panen:0,bersih,lokasi};

}

let panen = angka(document.getElementById("panen").value);
let harga = angka(document.getElementById("harga").value);
let upah = angka(document.getElementById("upah").value);

let bruto = panen * harga;
let potongan = potonganLokasi(lokasi);
let kotor = bruto - upah - potongan;
let fee = Math.round(kotor * feePersen(lokasi));
let bersih = kotor - fee;

document.getElementById("potongan").innerText = rupiah(potongan);
document.getElementById("bruto").innerText = rupiah(bruto);
document.getElementById("kotor").innerText = rupiah(kotor);
document.getElementById("fee").innerText = rupiah(fee);
document.getElementById("bersih").innerText = rupiah(bersih);

return {panen,bersih,lokasi};

}

function simpan(){

let h = hitung();
let data = JSON.parse(localStorage.getItem("panenData")) || [];

data.push({
tanggal:document.getElementById("tanggal").value,
lokasi:h.lokasi,
panen:h.panen,
bersih:h.bersih
});

localStorage.setItem("panenData",JSON.stringify(data));
renderPanen();

}

function renderPanen(){

let data = JSON.parse(localStorage.getItem("panenData")) || [];
let html="";

let now = new Date();
let bulan = now.getMonth()+1;
let tahun = now.getFullYear();
let totalBulan = 0;

let namaBulan=[
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

data.forEach((d,i)=>{

let p = d.tanggal.split("-");
let th = Number(p[0]);
let bl = Number(p[1]);

if(th===tahun && bl===bulan){
totalBulan += Number(d.bersih)||0;
}

html += `<tr>
<td>${d.tanggal}</td>
<td>${d.lokasi}</td>
<td>${d.panen}</td>
<td>${rupiah(d.bersih)}</td>
<td><button class="delete" onclick="hapusPanen(${i})">X</button></td>
</tr>`;

});

document.getElementById("tblPanen").innerHTML = html;
document.getElementById("totalPanenBulan").innerText = rupiah(totalBulan);
document.getElementById("namaBulanPanen").innerText = namaBulan[bulan-1];
document.getElementById("tahunPanen").innerText = tahun;

}

function hapusPanen(i){

let data = JSON.parse(localStorage.getItem("panenData")) || [];
data.splice(i,1);

localStorage.setItem("panenData",JSON.stringify(data));
renderPanen();

}

function kirimWA(){

let tanggal=tanggalIndonesia(document.getElementById("tanggal").value);
let lokasi=document.getElementById("lokasi").value;

if(lokasi==="Plasma 4" || lokasi==="Kebun Bersama"){

let bersih=document.getElementById("inputBersih").value;

let text=`LAPORAN PANEN

Tanggal : ${tanggal}
Lokasi  : ${lokasi}

━━━━━━━━━━━━━━━━━━━━━━
Pendapatan Bersih : Rp ${bersih}
━━━━━━━━━━━━━━━━━━━━━━`;

window.open("https://wa.me/?text="+encodeURIComponent(text));
return;

}

let panen=document.getElementById("panen").value;
let harga=document.getElementById("harga").value;
let upah=document.getElementById("upah").value;

let pot=document.getElementById("potongan").innerText;
let fee=document.getElementById("fee").innerText;
let bersih=document.getElementById("bersih").innerText;
let bruto=document.getElementById("bruto").innerText;

let text=`LAPORAN PANEN

Tanggal : ${tanggal}
Lokasi  : ${lokasi}

Hasil Panen      : ${panen} kg
Harga/kg         : Rp ${harga}

Pendapatan kotor : ${bruto}
Upah panen & Konsumsi : Rp ${upah}
Potongan Biaya Perawatan : ${pot}
Fee Pengawas     : ${fee}

━━━━━━━━━━━━━━━━━━━━━━
Pendapatan Bersih : ${bersih}
━━━━━━━━━━━━━━━━━━━━━━`;

window.open("https://wa.me/?text="+encodeURIComponent(text));

}

function kirimTransferWA(){

let tanggal=tanggalIndonesia(document.getElementById("tglTransfer").value);
let jumlah=document.getElementById("jumlahTransfer").value;
let catatan=document.getElementById("catatanTransfer").value;

let text=`LAPORAN TRANSFER

Tanggal : ${tanggal}

Jumlah  : Rp ${jumlah}

Catatan : ${catatan}`;

window.open("https://wa.me/?text="+encodeURIComponent(text));

}

function simpanTransfer(){

let data = JSON.parse(localStorage.getItem("transferData")) || [];
let idx = document.getElementById("editTransferIndex").value;

let obj = {
tanggal:document.getElementById("tglTransfer").value,
jumlah:angka(document.getElementById("jumlahTransfer").value),
catatan:document.getElementById("catatanTransfer").value
};

if(idx===""){
data.push(obj);
}else{
data[idx]=obj;
document.getElementById("editTransferIndex").value="";
}

localStorage.setItem("transferData",JSON.stringify(data));
renderTransfer();

}

function renderTransfer(){

let data = JSON.parse(localStorage.getItem("transferData")) || [];
let html="";

let now = new Date();
let bulan = now.getMonth()+1;
let tahun = now.getFullYear();
let totalBulan = 0;

let namaBulan=[
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

data.forEach((d,i)=>{

let p = d.tanggal.split("-");
let th = Number(p[0]);
let bl = Number(p[1]);

if(th===tahun && bl===bulan){
totalBulan += Number(d.jumlah)||0;
}

html += `<tr>
<td>${d.tanggal}</td>
<td>${rupiah(d.jumlah)}</td>
<td>${d.catatan}</td>
<td class="action-btn">
<button class="edit" onclick="editTransfer(${i})">Edit</button>
<button class="delete" onclick="hapusTransfer(${i})">Hapus</button>
</td>
</tr>`;

});

document.getElementById("tblTransfer").innerHTML = html;
document.getElementById("totalTransferBulan").innerText = rupiah(totalBulan);
document.getElementById("namaBulanTransfer").innerText = namaBulan[bulan-1];
document.getElementById("tahunTransfer").innerText = tahun;

}

function editTransfer(i){

let data = JSON.parse(localStorage.getItem("transferData")) || [];
let d = data[i];

document.getElementById("editTransferIndex").value=i;
document.getElementById("tglTransfer").value=d.tanggal;
document.getElementById("jumlahTransfer").value=d.jumlah.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
document.getElementById("catatanTransfer").value=d.catatan;

window.scrollTo({top:0,behavior:"smooth"});

}

function hapusTransfer(i){

let data = JSON.parse(localStorage.getItem("transferData")) || [];
data.splice(i,1);

localStorage.setItem("transferData",JSON.stringify(data));
renderTransfer();

}

function simpanDanKirimPanen(){

simpan();
kirimWA();

document.getElementById("tanggal").value="";
resetHitung();

}

function simpanDanKirimTransfer(){

simpanTransfer();
kirimTransferWA();

document.getElementById("tglTransfer").value="";
document.getElementById("jumlahTransfer").value="";
document.getElementById("catatanTransfer").value="";
document.getElementById("editTransferIndex").value="";

}

cekLokasi();
renderPanen();
renderTransfer();

</script>
<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
.then(function(reg){
console.log("Service Worker aktif", reg);
})
.catch(function(err){
console.log("Service Worker gagal", err);
});
}
</script>
<script>
window.addEventListener("load", function(){

setTimeout(function(){
var splash = document.getElementById("splash-screen");
if(splash){
splash.style.opacity="0";
setTimeout(function(){
splash.remove();
},300);
}
},800);

});
</script>
<div id="install-app">
<button id="btnInstall">Install DodiApps</button>
</div>

<script>

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {

e.preventDefault();

deferredPrompt = e;

document.getElementById("install-app").style.display = "block";

});

document.getElementById("btnInstall").addEventListener("click", async () => {

if(!deferredPrompt) return;

deferredPrompt.prompt();

const result = await deferredPrompt.userChoice;

if(result.outcome === "accepted"){
document.getElementById("install-app").style.display="none";
}

deferredPrompt = null;

});

</script>
<script>
if ("serviceWorker" in navigator) {

  window.addEventListener("load", function() {

    navigator.serviceWorker.register("sw.js")
      .then(function(reg) {
        console.log("Service Worker berhasil diaktifkan");
      })
      .catch(function(err) {
        console.log("Service Worker gagal:", err);
      });

  });

}
</script>
</body>
</html>
